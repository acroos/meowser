# .github/workflows/notify-meowser.yml
# Drop-in workflow for a tracked repo. Copy this file into your repo at
# .github/workflows/notify-meowser.yml, then replace <MEOWSER_OWNER> with
# the GitHub user or org that owns your meowser fork.
#
# All the real work (building the dispatch payload, calling the GitHub
# API) lives in meowser's reusable workflow at
# <MEOWSER_OWNER>/meowser/.github/workflows/notify.yml — that way payload
# changes ship via a meowser tag bump, not edits to every tracked repo.
name: Notify meowser

on:
  pull_request:
    types: [closed]
    branches: [main]   # change to your default branch if not 'main'

jobs:
  notify:
    if: ${{ github.event.pull_request.merged == true }}
    uses: <MEOWSER_OWNER>/meowser/.github/workflows/notify.yml@v1
    with:
      meowser-owner: <MEOWSER_OWNER>
    secrets:
      dispatch-token: ${{ secrets.MEOWSER_DISPATCH_TOKEN }}
